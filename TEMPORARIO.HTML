<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PipocaFlix Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: 
    radial-gradient(circle at top, #1a1a1a, #000 70%);
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 95%;
    max-width: 1500px;
}

.logo {
    color: #e50914;
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 15px;
    text-shadow: 0 0 25px rgba(229, 9, 20, 0.7);
}

.player-box {
    overflow: hidden;
    border-radius: 20px;
    background: #000;
    box-shadow: 
        0 0 50px rgba(229, 9, 20, 0.45),
        0 20px 60px rgba(0,0,0,.8);
}

video {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    background: black;
}

.plyr {
    --plyr-color-main: #e50914;
    --plyr-video-control-color: white;
}

.info {
    margin-top: 15px;
    color: #aaa;
    font-size: 14px;
}

@media (max-width: 768px) {

    body {
        align-items: flex-start;
        padding-top: 40px;
    }

    .logo {
        font-size: 24px;
        text-align: center;
    }

    .container {
        width: 100%;
    }

    .player-box {
        border-radius: 0;
    }

}

</style>

</head>


<body>

<div class="container">

    <div class="logo">
        🍿 PIPOCAFLIX
    </div>


    <div class="player-box">

        <video 
            id="player"
            controls
            playsinline
            preload="metadata"
        >

        <source 
            src="https://reprodutormp4.canalpedroid.workers.dev/"
            type="video/mp4">

        Seu navegador não suporta vídeo.

        </video>

    </div>

    <div class="info">
        Assista em HD • Tela cheia disponível • Controle de velocidade
    </div>

</div>


<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr("#player", {

controls: [
    "play-large",
    "rewind",
    "play",
    "fast-forward",
    "progress",
    "current-time",
    "duration",
    "mute",
    "volume",
    "settings",
    "fullscreen"
],

settings: [
    "speed"
],

speed: {
    selected: 1,
    options: [
        0.5,
        0.75,
        1,
        1.25,
        1.5,
        2
    ]
}

});

// Log de erros
player.on("error", event => {
    console.log("Erro no player:", event);
});

</script>


</body>

</html>
