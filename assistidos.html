<script>

// ── Scroll / back-to-top ──
window.addEventListener('scroll', () => {
  document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 60);
  document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 400);
}, {passive:true});
document.getElementById('backToTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

// ── Mobile search ──
document.getElementById('mobileSearchToggle').addEventListener('click', () => {
  document.getElementById('mobileSearchOverlay').classList.add('open');
  setTimeout(() => document.getElementById('mobileSearchInput').focus(), 80);
});
document.getElementById('mobileSearchClose').addEventListener('click', () => {
  document.getElementById('mobileSearchOverlay').classList.remove('open');
  document.getElementById('mobileSearchInput').value = '';
});

// ── Hamburger ──
(function(){
  const btn = document.getElementById('hamburgerBtn');
  const menu = document.getElementById('mobileNavMenu');
  if (!btn||!menu) return;
  btn.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', e => {
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('open');
      btn.classList.remove('open');
    }
  });
})();

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Render assistidos ──
function renderAssistidos() {
  const grid = document.getElementById('assistidosGrid');
  const countEl = document.getElementById('assistidosCount');
  const items = window.PipocaWatched.getAll();
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.innerHTML = `
      <div class="assistidos-empty" style="grid-column:1/-1">
        <span class="assistidos-empty-icon">🎬</span>
        <p class="assistidos-empty-title">Nenhum título assistido ainda</p>
        <p style="color:var(--text-3);font-size:.85rem;margin-top:.5rem">
          Quando você marcar um filme ou série como assistido, ele aparece aqui.
        </p>
        <a href="index.html" class="btn-primary" style="display:inline-flex;margin-top:1.5rem;text-decoration:none">
          Explorar catálogo
        </a>
      </div>`;
    countEl.textContent = 'Seu histórico de títulos assistidos';
    return;
  }

  countEl.textContent = `${items.length} título${items.length !== 1 ? 's' : ''} assistido${items.length !== 1 ? 's' : ''}`;

  items.forEach(prog => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.cursor = 'pointer';
    const page = prog.tipo === 'serie' ? 'serie.html' : 'filme.html';

    div.innerHTML = `
      <div class="card-thumb-wrap" style="position:relative">
        <img class="card-thumb" src="${prog.capa||''}" alt="${prog.nome}" loading="lazy"
          onerror="this.src='https://placehold.co/300x450/13131a/333?text=Sem+Capa'">
        <span class="card-badge">${prog.tipo === 'serie' ? 'Série' : 'Filme'}</span>
        <!-- Badge assistido -->
        <span style="position:absolute;top:6px;left:6px;background:rgba(34,197,94,0.85);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </span>
        <!-- Botão remover -->
        <button class="btn-watched-overlay" title="Remover dos assistidos" style="opacity:0"
          onclick="event.stopPropagation();window.PipocaWatched.remove('${prog.nome.replace(/'/g,"\\'")}');renderAssistidos();showToast('↩️ Removido dos Assistidos')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="card-info">
        <div class="card-name">${prog.nome}</div>
      </div>`;

    div.querySelector('.card-thumb-wrap').addEventListener('mouseenter', function() {
      this.querySelector('.btn-watched-overlay').style.opacity = '1';
    });
    div.querySelector('.card-thumb-wrap').addEventListener('mouseleave', function() {
      this.querySelector('.btn-watched-overlay').style.opacity = '0';
    });
    div.addEventListener('click', () => location.href = `${page}?nome=${encodeURIComponent(prog.nome)}`);
    grid.appendChild(div);
  });
}

// ── Botão "Limpar tudo" ──
function addClearBtn() {
  const items = window.PipocaWatched.getAll();
  if (items.length === 0) return;
  const hero = document.querySelector('.assistidos-page-hero');
  if (!hero || hero.querySelector('.btn-clear-watched')) return;
  const btn = document.createElement('button');
  btn.className = 'btn-watched btn-clear-watched';
  btn.style.marginTop = '0.75rem';
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg> Limpar histórico';
  btn.addEventListener('click', () => {
    if (confirm('Remover todos os títulos assistidos?')) {
      window.PipocaWatched.clear();
      renderAssistidos();
      addClearBtn();
      showToast('🗑️ Histórico limpo');
    }
  });
  hero.appendChild(btn);
}

document.addEventListener('DOMContentLoaded', () => {
  renderAssistidos();
  addClearBtn();
});
</script>

<script>
// ── Pesquisa por Voz (Web Speech API) ──
(function(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ document.querySelectorAll('.voice-search-btn').forEach(function(b){b.style.display='none';}); return; }
  var rec = new SR(); rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false;
  var active=null;
  function startVoice(btn,input){
    if(active){rec.stop();return;}
    active=btn; btn.classList.add('voice-listening'); btn.title='Ouvindo...';
    rec.start();
    rec.onresult=function(e){var t=e.results[0][0].transcript;input.value=t;input.dispatchEvent(new Event('input',{bubbles:true}));};
    rec.onerror=function(){};
    rec.onend=function(){if(active){active.classList.remove('voice-listening');active.title='Busca por voz';}active=null;};
  }
  window.addEventListener('DOMContentLoaded',function(){
    var db=document.getElementById('voiceSearchBtn'),di=document.getElementById('desktopSearchInput');
    var mb=document.getElementById('voiceSearchBtnMobile'),mi=document.getElementById('mobileSearchInput');
    if(db&&di) db.addEventListener('click',function(){startVoice(db,di);});
    if(mb&&mi) mb.addEventListener('click',function(){startVoice(mb,mi);});
  });
})();
</script>
